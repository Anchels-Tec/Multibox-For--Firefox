<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- três caixas empilhadas em cores diferentes = várias sessões isoladas -->
  <!-- caixa de trás (laranja) -->
  <rect x="9"  y="9"  width="30" height="30" rx="8" fill="#fb923c" stroke="#c2560a" stroke-width="2"/>
  <!-- caixa do meio (verde-água) -->
  <rect x="17" y="17" width="30" height="30" rx="8" fill="#2dd4bf" stroke="#0f766e" stroke-width="2"/>
  <!-- caixa da frente (azul) -->
  <rect x="25" y="25" width="30" height="30" rx="8" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <!-- brilho na caixa da frente -->
  <rect x="25" y="25" width="30" height="11" rx="8" fill="#ffffff" fill-opacity="0.14"/>
</svg>
