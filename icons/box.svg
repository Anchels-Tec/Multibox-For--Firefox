<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- duas caixas sobrepostas = várias sessões isoladas. Centralizado, cores
       de alto contraste e separação clara pra ler bem até em 16px. -->
  <!-- caixa de trás (azul) -->
  <rect x="10" y="10" width="32" height="32" rx="8" fill="#3b82f6"/>
  <!-- caixa da frente (laranja) com contorno claro separando da de trás -->
  <rect x="22" y="22" width="32" height="32" rx="8" fill="#fb923c" stroke="#ffffff" stroke-width="2.5"/>
  <!-- brilho superior sutil na caixa da frente -->
  <rect x="23.2" y="23.2" width="29.6" height="12" rx="6.5" fill="#ffffff" fill-opacity="0.18"/>
</svg>
